<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sokol Space Miner</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        background:
          radial-gradient(circle at top, rgba(40, 70, 120, 0.25), transparent 40%),
          linear-gradient(180deg, #09111f 0%, #04070c 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #dce9ff;
      }

      .frame {
        width: min(96vw, 1400px);
        aspect-ratio: 16 / 9;
        border: 1px solid rgba(125, 180, 255, 0.24);
        border-radius: 18px;
        overflow: hidden;
        background: rgba(7, 12, 20, 0.75);
        box-shadow:
          0 24px 90px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        position: relative;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
      }

      .label {
        position: absolute;
        left: 18px;
        top: 16px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(7, 16, 29, 0.78);
        border: 1px solid rgba(150, 198, 255, 0.22);
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="label">Sokol Space Miner</div>
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>
    <script>
      var Module = {
        canvas: document.getElementById("canvas"),
        print: function (text) {
          console.log(text);
        },
        printErr: function (text) {
          console.error(text);
        }
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
