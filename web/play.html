<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signal — Keep the Belt Connected</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Condensed:wght@400;500;600&display=swap");

      :root {
        color-scheme: dark;
        --bg-0: #080706;
        --bg-1: #110f0d;
        --bg-2: #1a1510;
        --panel: rgba(18, 17, 14, 0.82);
        --panel-strong: rgba(28, 24, 18, 0.9);
        --ink: #f5efdf;
        --muted: #cfc3ad;
        --faint: #8e846f;
        --line: rgba(245, 239, 223, 0.12);
        --ore: #f1b566;
        --signal: #80ffd5;
        --danger: #ff8764;
        --shadow: 0 28px 80px rgba(0, 0, 0, 0.36);
        font-family: "IBM Plex Sans Condensed", "Arial Narrow", sans-serif;
        background:
          radial-gradient(circle at 16% 18%, rgba(241, 181, 102, 0.18), transparent 30%),
          radial-gradient(circle at 86% 76%, rgba(128, 255, 213, 0.12), transparent 26%),
          linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 48%, var(--bg-0) 100%);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        min-height: 100dvh;
      }

      body {
        overflow: hidden;
        color: var(--ink);
        position: relative;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 120px 120px;
        mask-image: radial-gradient(circle at center, black 24%, transparent 88%);
        opacity: 0.38;
      }

      body::after {
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.16), rgba(0, 0, 0, 0.54)),
          radial-gradient(circle at center, transparent 44%, rgba(0, 0, 0, 0.42) 100%);
      }

      #menu {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(4, 4, 3, 0.72);
        backdrop-filter: blur(6px);
        transition: opacity 0.3s, visibility 0.3s;
      }

      #menu.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .menu-shell {
        width: min(420px, calc(100% - 36px));
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--panel-strong);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .menu-header {
        padding: 22px 24px 16px;
        border-bottom: 1px solid var(--line);
        text-align: center;
      }

      .menu-header .title {
        color: var(--signal);
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .menu-header .status {
        color: var(--faint);
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .menu-actions {
        padding: 16px 20px;
        display: grid;
        gap: 8px;
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        border: 1px solid var(--line);
        border-radius: 10px;
        color: var(--ink);
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 12px;
        font-family: "IBM Plex Mono", monospace;
        background: rgba(245, 239, 223, 0.03);
        transition: border-color 0.2s, background 0.2s;
        cursor: pointer;
      }

      .btn:hover {
        border-color: rgba(245, 239, 223, 0.28);
        background: rgba(245, 239, 223, 0.07);
      }

      .btn.primary {
        color: #0f1311;
        background: linear-gradient(135deg, var(--signal), #a6ffd8 70%);
        border-color: rgba(128, 255, 213, 0.9);
      }

      .btn.primary:hover {
        background: linear-gradient(135deg, #92ffdc, #b7ffe2 70%);
      }

      .menu-section {
        padding: 14px 20px;
        border-top: 1px solid var(--line);
      }

      .menu-section-title {
        color: var(--faint);
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .controls-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px 16px;
      }

      .control-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
        font-family: "IBM Plex Mono", monospace;
      }

      .control-item kbd {
        display: inline-block;
        min-width: 22px;
        padding: 2px 6px;
        border: 1px solid rgba(245, 239, 223, 0.12);
        border-radius: 4px;
        background: rgba(245, 239, 223, 0.05);
        color: var(--ore);
        font-size: 11px;
        text-align: center;
        font-family: inherit;
      }

      .menu-footer {
        padding: 12px 20px 16px;
        border-top: 1px solid var(--line);
        text-align: center;
        color: var(--faint);
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.1em;
      }

      .menu-footer a {
        color: var(--signal);
        text-decoration: none;
      }

      .menu-footer a:hover {
        text-decoration: underline;
      }

      #game {
        position: fixed;
        inset: 0;
        z-index: 1;
      }

      #game canvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
      }

      #loading {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(7, 7, 6, 0.95);
        color: rgba(245, 239, 223, 0.76);
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      #loading.active {
        display: flex;
      }

      #esc-hint {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 8;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(245, 239, 223, 0.1);
        background: rgba(7, 7, 6, 0.52);
        color: rgba(245, 239, 223, 0.42);
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        opacity: 0;
        transition: opacity 1s;
        pointer-events: none;
        backdrop-filter: blur(10px);
      }

      #esc-hint.visible {
        opacity: 1;
        transition: opacity 0.3s;
      }

      @media (max-width: 480px) {
        .menu-shell {
          width: calc(100% - 24px);
        }

        .controls-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="menu">
      <div class="menu-shell">
        <div class="menu-header">
          <div class="title">Signal</div>
          <div class="status">Paused</div>
        </div>

        <div class="menu-actions">
          <button class="btn primary" id="play-btn">Resume</button>
          <a class="btn" href="/" id="quit-btn">Quit to Menu</a>
        </div>

        <div class="menu-section">
          <div class="menu-section-title">Controls</div>
          <div class="controls-grid">
            <div class="control-item"><kbd>W</kbd><kbd>S</kbd> Thrust</div>
            <div class="control-item"><kbd>A</kbd><kbd>D</kbd> Turn</div>
            <div class="control-item"><kbd>Space</kbd> Mine</div>
            <div class="control-item"><kbd>E</kbd> Dock / Launch</div>
            <div class="control-item"><kbd>1</kbd>-<kbd>5</kbd> Station tabs</div>
            <div class="control-item"><kbd>6</kbd> Outpost</div>
            <div class="control-item"><kbd>R</kbd> Reset</div>
            <div class="control-item"><kbd>Esc</kbd> This menu</div>
          </div>
        </div>

        <div class="menu-footer">
          <a href="https://github.com/atimics/signal" target="_blank" rel="noreferrer">github.com/atimics/signal</a>
        </div>
      </div>
    </div>

    <div id="loading">Entering the belt...</div>
    <div id="esc-hint">Esc to reopen briefing</div>

    <div id="game">
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>

    <script>
      var gameStarted = false;
      var menuVisible = true;

      function showMenu() {
        menuVisible = true;
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('esc-hint').classList.remove('visible');
      }

      function hideMenu() {
        menuVisible = false;
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('canvas').focus();
        var hint = document.getElementById('esc-hint');
        hint.classList.add('visible');
        setTimeout(function() { hint.classList.remove('visible'); }, 3000);
      }

      function startGame() {
        if (gameStarted) {
          hideMenu();
          return;
        }
        gameStarted = true;

        document.getElementById('play-btn').textContent = 'Resume';
        document.querySelector('.menu-header .status').textContent = 'Paused';
        document.getElementById('loading').classList.add('active');

        var script = document.createElement('script');
        script.src = 'space_miner.js';
        script.onload = function() {
          document.getElementById('loading').classList.remove('active');
          hideMenu();
        };
        document.body.appendChild(script);
      }

      /* Initial state before game loads */
      document.getElementById('play-btn').textContent = 'Enter the Belt';
      document.querySelector('.menu-header .status').textContent = 'Ready';

      document.getElementById('play-btn').addEventListener('click', startGame);

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && gameStarted) {
          e.preventDefault();
          e.stopPropagation();
          if (menuVisible) {
            hideMenu();
          } else {
            showMenu();
          }
        }
      });

      var Module = {
        canvas: document.getElementById('canvas'),
        print: function(text) { console.log(text); },
        printErr: function(text) { console.error(text); }
      };
    </script>
  </body>
</html>
