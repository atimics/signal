<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signal — Play</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Condensed:wght@400;500;600&display=swap");

      :root {
        color-scheme: dark;
        --bg: #080706;
        --panel: rgba(10, 10, 9, 0.84);
        --line: rgba(245, 239, 223, 0.14);
        --ink: #f5efdf;
        --muted: #cfc3ad;
        --signal: #80ffd5;
        --ore: #f1b566;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 16% 18%, rgba(241, 181, 102, 0.08), transparent 26%),
          radial-gradient(circle at 86% 76%, rgba(128, 255, 213, 0.08), transparent 24%),
          var(--bg);
      }

      body {
        color: var(--ink);
        font-family: "IBM Plex Sans Condensed", "Arial Narrow", sans-serif;
      }

      #loading {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--signal);
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: var(--bg);
        transition: opacity 0.4s;
      }

      #loading.done {
        opacity: 0;
        pointer-events: none;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

    </style>
  </head>
  <body>
    <div id="loading">Linking signal chain...</div>


    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script>
      var canvas = document.getElementById('canvas');

      var Module = {
        canvas: canvas,
        print: function(text) { console.log(text); },
        printErr: function(text) { console.error(text); }
      };

      canvas.addEventListener('pointerdown', function() {
        canvas.focus();
      });

      var script = document.createElement('script');
      script.src = './space_miner.js';
      script.onload = function() {
        document.getElementById('loading').classList.add('done');
        canvas.focus();
        initMusic();
      };
      document.body.appendChild(script);

      /* ---- Music Player ---- */
      var MUSIC_CDN = 'https://signal-ratimics-assets.s3.amazonaws.com/music';
      var MUSIC_TRACKS = [
        'belt_drifters.mp3', 'echoes.mp3', 'clock_thunder.mp3',
        'kings_of_nowhere.mp3', 'vector_economy.mp3', 'vector_miners_epoch.mp3',
        'vector_veins.mp3', 'vector_veins_lofi.mp3', 'vector_veins_80s.mp3',
        'belt_drifters_2.mp3', 'echoes_2.mp3', 'echoes_3.mp3',
        'clock_thunder_2.mp3', 'kings_of_nowhere_2.mp3', 'vector_economy_2.mp3',
        'vector_miners_epoch_2.mp3', 'vector_veins_80s_2.mp3'
      ];

      var musicAudio = null;
      var musicIdx = -1;
      var musicStarted = false;
      var musicVolume = 0.6;

      function shuffleArray(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
        }
      }

      function initMusic() {
        shuffleArray(MUSIC_TRACKS);
        musicAudio = new Audio();
        musicAudio.volume = 0;
        musicAudio.addEventListener('ended', function() { playNextTrack(); });

        /* Browser autoplay requires user gesture — start on first click/key */
        var startOnce = function() {
          if (!musicStarted) {
            musicStarted = true;
            playNextTrack();
          }
          document.removeEventListener('pointerdown', startOnce);
          document.removeEventListener('keydown', startOnce);
        };
        document.addEventListener('pointerdown', startOnce);
        document.addEventListener('keydown', startOnce);

        /* Poll signal strength and adjust volume */
        setInterval(updateMusicVolume, 200);
      }

      function playNextTrack() {
        musicIdx = (musicIdx + 1) % MUSIC_TRACKS.length;
        musicAudio.src = MUSIC_CDN + '/' + MUSIC_TRACKS[musicIdx];
        musicAudio.play().catch(function() {});
      }

      function updateMusicVolume() {
        if (!musicAudio || !musicStarted) return;
        var sig = 0;
        try { sig = Module._get_signal_strength(); } catch(e) { return; }

        /* Music: silent below 0.20, fades in to full at 0.80 */
        var vol = 0;
        if (sig > 0.20) {
          vol = Math.min(1.0, (sig - 0.20) / 0.60);
        }
        musicAudio.volume = vol * musicVolume;
      }
    </script>
  </body>
</html>
