<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signal</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Condensed:wght@400;500;600&display=swap");

      :root {
        color-scheme: dark;
        --bg-0: #080706; --bg-1: #110f0d; --bg-2: #1a1510;
        --ink: #f5efdf; --muted: #cfc3ad; --faint: #8e846f;
        --line: rgba(245, 239, 223, 0.10);
        --signal: #80ffd5;
        font-family: "IBM Plex Sans Condensed", "Arial Narrow", sans-serif;
        background:
          radial-gradient(circle at 16% 18%, rgba(241,181,102,0.18), transparent 30%),
          radial-gradient(circle at 86% 76%, rgba(128,255,213,0.12), transparent 26%),
          linear-gradient(180deg, var(--bg-2), var(--bg-1) 48%, var(--bg-0));
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { min-height: 100dvh; }
      body {
        color: var(--ink);
        display: flex; flex-direction: column; align-items: center;
        justify-content: center;
        padding: 32px 20px 48px;
      }
      body::before, body::after { content: ""; position: fixed; inset: 0; pointer-events: none; }
      body::before {
        background: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
        background-size: 120px 120px;
        mask-image: radial-gradient(circle at center, black 24%, transparent 88%);
        opacity: 0.38;
      }
      body::after {
        background: linear-gradient(180deg, rgba(0,0,0,0.16), rgba(0,0,0,0.54)),
                    radial-gradient(circle at center, transparent 44%, rgba(0,0,0,0.42) 100%);
      }

      .page { position: relative; z-index: 1; width: min(480px, 100%); text-align: center; }

      h1 {
        font-size: clamp(72px, 16vw, 140px);
        line-height: 0.88; letter-spacing: 0.06em;
        text-transform: uppercase; font-weight: 600;
        margin-bottom: 16px;
      }
      h1 .a { color: var(--signal); }

      .tag {
        font-size: clamp(18px, 3vw, 26px);
        line-height: 1.1; color: rgba(245,239,223,0.88);
        margin-bottom: 32px;
      }

      .actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 28px; }

      .btn {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 14px 28px; border: 1px solid var(--line); border-radius: 999px;
        color: var(--ink); text-decoration: none; text-transform: uppercase;
        letter-spacing: 0.14em; font-size: 12px;
        font-family: "IBM Plex Mono", monospace;
        background: rgba(245,239,223,0.04);
        transition: transform 0.2s, border-color 0.2s, background 0.2s;
        cursor: pointer;
      }
      .btn:hover { transform: translateY(-1px); border-color: rgba(245,239,223,0.3); background: rgba(245,239,223,0.08); }
      .btn.go {
        color: #0f1311; font-size: 13px; padding: 16px 40px;
        background: linear-gradient(135deg, var(--signal), #a6ffd8 70%);
        border-color: rgba(128,255,213,0.9);
      }
      .btn.go:hover { background: linear-gradient(135deg, #92ffdc, #b7ffe2 70%); }

      .links {
        display: flex; gap: 20px; justify-content: center;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px; letter-spacing: 0.1em;
      }
      .links a { color: var(--faint); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
      .links a:hover { color: var(--ink); }

      @media (max-width: 600px) {
        body { padding: 24px 14px 36px; }
        .btn { width: 100%; }
        .links { flex-wrap: wrap; gap: 14px; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>S<span class="a">i</span>gnal</h1>
      <p class="tag">Mine the belt. Extend the chain.</p>

      <div class="actions">
        <a class="btn go" href="/play">Play</a>
        <a class="btn" href="/music">Soundtrack</a>
        <a class="btn" href="https://github.com/cenetex/signal" target="_blank">GitHub</a>
      </div>

      <div class="links">
        <a href="https://ratimics.com">ratimics</a>
      </div>
    </div>
  </body>
</html>
