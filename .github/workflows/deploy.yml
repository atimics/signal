name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # Tests and client deploy run in parallel — tests are fast (16s),
  # no need to gate the WASM build behind them.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        run: |
          cmake -S . -B build-test -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON
          cmake --build build-test
          ./build-test/space_miner_test

  deploy-client:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Build WASM
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release -DGIT_HASH=$GIT_HASH
          cmake --build build-web

      # Browser smoke tests — same WASM build, no second Emscripten install
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Browser smoke tests
        run: |
          npm install
          npx playwright install chromium --with-deps
          npx playwright test

      - name: Upload smoke results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/

      - name: Prepare artifacts
        run: |
          mkdir -p _site/play _site/music
          cp web/index.html _site/index.html
          cp web/play.html _site/play/index.html
          cp web/music.html _site/music/index.html
          cp build-web/space_miner.js _site/play/space_miner.js
          cp build-web/space_miner.wasm _site/play/space_miner.wasm
          sed -i 's|<head>|<head><script>window.SIGNAL_SERVER="wss://signal-ws.ratimics.com/ws";</script>|' _site/play/index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::022118847419:role/github-actions-deploy
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync _site/ s3://signal-ratimics-client/ --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E32W3RMW5O86FJ --paths "/*"

  deploy-server:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::022118847419:role/github-actions-deploy
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute short hash
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: 022118847419.dkr.ecr.us-east-1.amazonaws.com/signal-relay:latest
          build-args: GIT_HASH=${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to ECS
        run: |
          set -euo pipefail
          IMAGE_REPO=022118847419.dkr.ecr.us-east-1.amazonaws.com/signal-relay
          ARM64_DIGEST=$(
            aws ecr batch-get-image \
              --repository-name signal-relay \
              --image-ids imageTag=latest \
              --accepted-media-types application/vnd.oci.image.index.v1+json \
              --query 'images[0].imageManifest' \
              --output text |
            jq -r '.manifests[] | select(.platform.architecture == "arm64" and .platform.os == "linux") | .digest'
          )
          aws ecs describe-task-definition \
            --task-definition signal-relay-server \
            --query 'taskDefinition' > taskdef.json
          jq --arg image "${IMAGE_REPO}@${ARM64_DIGEST}" '
            .containerDefinitions[0].image = $image |
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' taskdef.json > taskdef-deploy.json
          TASK_DEF_ARN=$(
            aws ecs register-task-definition \
              --cli-input-json file://taskdef-deploy.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )
          aws ecs update-service \
            --cluster default \
            --service signal-relay \
            --task-definition "$TASK_DEF_ARN"
          # Fire and forget — don't wait for ECS stabilization

  native:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgl-dev libx11-dev libxi-dev libxcursor-dev libasound2-dev

      - name: Build
        shell: bash
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGIT_HASH=$GIT_HASH
          cmake --build build --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signal-${{ matrix.name }}
          path: build/
