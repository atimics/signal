name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        run: |
          cmake -S . -B build-test -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON
          cmake --build build-test
          ./build-test/space_miner_test

  deploy-client:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Build WASM
        run: |
          emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release
          cmake --build build-web

      - name: Prepare artifacts
        run: |
          mkdir -p _site
          cp build-web/space_miner.html _site/index.html
          cp build-web/space_miner.js _site/space_miner.js
          cp build-web/space_miner.wasm _site/space_miner.wasm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::022118847419:role/github-actions-deploy
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync _site/ s3://signal-ratimics-client/ --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E32W3RMW5O86FJ --paths "/*"

  deploy-server:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::022118847419:role/github-actions-deploy
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push server image
        run: |
          docker build -f server/Dockerfile . -t 022118847419.dkr.ecr.us-east-1.amazonaws.com/signal-relay:latest
          docker push 022118847419.dkr.ecr.us-east-1.amazonaws.com/signal-relay:latest

      - name: Deploy to ECS
        run: aws ecs update-service --cluster default --service signal-relay --force-new-deployment
