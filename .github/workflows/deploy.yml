name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        run: |
          cmake -S . -B build-test -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON
          cmake --build build-test
          ./build-test/space_miner_test

  native:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgl-dev libx11-dev libxi-dev libxcursor-dev libasound2-dev

      - name: Build
        shell: bash
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGIT_HASH=$GIT_HASH
          cmake --build build --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signal-${{ matrix.name }}
          path: build/

  deploy-client:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Build WASM
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release -DGIT_HASH=$GIT_HASH
          cmake --build build-web

      - name: Prepare artifacts
        run: |
          mkdir -p _site/play
          cp web/index.html _site/index.html
          cp web/play.html _site/play/index.html
          cp build-web/space_miner.js _site/play/space_miner.js
          cp build-web/space_miner.wasm _site/play/space_miner.wasm
          # Inject server URL so the client binary doesn't hardcode it
          sed -i 's|<head>|<head><script>window.SIGNAL_SERVER="wss://signal-ws.ratimics.com/ws";</script>|' _site/play/index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::022118847419:role/github-actions-deploy
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync _site/ s3://signal-ratimics-client/ --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E32W3RMW5O86FJ --paths "/*"

  deploy-server:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::022118847419:role/github-actions-deploy
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push server image
        run: |
          set -euo pipefail
          GIT_HASH=$(git rev-parse --short HEAD)
          docker buildx build \
            --platform linux/arm64 \
            -f server/Dockerfile . \
            --build-arg GIT_HASH=$GIT_HASH \
            -t 022118847419.dkr.ecr.us-east-1.amazonaws.com/signal-relay:latest \
            --push

      - name: Deploy to ECS
        run: |
          set -euo pipefail
          IMAGE_REPO=022118847419.dkr.ecr.us-east-1.amazonaws.com/signal-relay
          ARM64_DIGEST=$(
            aws ecr batch-get-image \
              --repository-name signal-relay \
              --image-ids imageTag=latest \
              --accepted-media-types application/vnd.oci.image.index.v1+json \
              --query 'images[0].imageManifest' \
              --output text |
            jq -r '.manifests[] | select(.platform.architecture == "arm64" and .platform.os == "linux") | .digest'
          )
          aws ecs describe-task-definition \
            --task-definition signal-relay-server \
            --query 'taskDefinition' > taskdef.json
          jq --arg image "${IMAGE_REPO}@${ARM64_DIGEST}" '
            .containerDefinitions[0].image = $image |
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' taskdef.json > taskdef-deploy.json
          TASK_DEF_ARN=$(
            aws ecs register-task-definition \
              --cli-input-json file://taskdef-deploy.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )
          aws ecs update-service \
            --cluster default \
            --service signal-relay \
            --task-definition "$TASK_DEF_ARN"
          aws ecs wait services-stable --cluster default --services signal-relay
